<!DOCTYPE html>
<html>
<head>
<title>Truth Dare Game</title>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(45deg,#ff6ec4,#7873f5);
color:white;
padding-top:40px;
}

button{
padding:12px 20px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#truth{background:#00c853;color:white;}
#dare{background:#ff1744;color:white;}

#bottle{
font-size:80px;
display:inline-block;
transition: transform 2s;
}

#result{
margin-top:25px;
font-size:22px;
background:white;
color:black;
padding:20px;
border-radius:10px;
width:80%;
margin:auto;
}
</style>

</head>

<body>

<h1>🎮 Truth Dare Game</h1>

<div id="bottle">🍾</div>
<br>

<button onclick="spinBottle()">Spin Bottle</button>
<br>

<button id="truth" onclick="getTruth()">Truth</button>
<button id="dare" onclick="getDare()">Dare</button>

<div id="result">Spin the bottle first</div>

<script>

let truths=[
"What is your biggest fear?",
"Who was your first crush?",
"Have you ever lied to your best friend?",
"What is your secret dream?"
];

let dares=[
"Sing a song loudly",
"Do 10 jumping jacks",
"Dance for 20 seconds",
"Talk in funny voice for 1 minute"
];

function spinBottle(){
let bottle=document.getElementById("bottle");
let randomDeg=3600 + Math.floor(Math.random()*360);
bottle.style.transform="rotate("+randomDeg+"deg)";
document.getElementById("result").innerText="Bottle stopped! Choose Truth or Dare.";
}

function getTruth(){
let random=Math.floor(Math.random()*truths.length);
document.getElementById("result").innerText=truths[random];
}

function getDare(){
let random=Math.floor(Math.random()*dares.length);
document.getElementById("result").innerText=dares[random];
}

</script>

</body>
</html>
