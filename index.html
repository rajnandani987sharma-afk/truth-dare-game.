<!DOCTYPE html>
<html>
<head>
<title>Truth Dare Game</title>
<style>
body{
font-family: Arial;
text-align:center;
background:linear-gradient(45deg,#ff6ec4,#7873f5);
color:white;
padding-top:50px;
}

button{
padding:15px 25px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#truth{background:#00c853;color:white;}
#dare{background:#ff1744;color:white;}

#result{
margin-top:30px;
font-size:22px;
background:white;
color:black;
padding:20px;
border-radius:10px;
width:80%;
margin-left:auto;
margin-right:auto;
}
</style>
</head>

<body>

<h1>🎮 Truth Dare Game</h1>

<button id="truth" onclick="getTruth()">Truth</button>
<button id="dare" onclick="getDare()">Dare</button>

<div id="result">Click Truth or Dare</div>

<script>

let truths=[
"What is your biggest fear?",
"Have you ever lied to your best friend?",
"Who was your first crush?",
"What is your biggest secret?",
"Have you ever cheated in exam?"
];

let dares=[
"Sing a song loudly.",
"Do 10 jumping jacks.",
"Talk in funny voice for 1 minute.",
"Send a funny selfie.",
"Dance for 20 seconds."
];

function getTruth(){
let random=Math.floor(Math.random()*truths.length);
document.getElementById("result").innerText=truths[random];
}

function getDare(){
let random=Math.floor(Math.random()*dares.length);
document.getElementById("result").innerText=dares[random];
}

</script>

</body>
</html>
