<!DOCTYPE html>
<html>
<head>
<title>Spin The Bottle</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(45deg,#ff6ec4,#7873f5);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
color:white;
}

#bottle{
font-size:40vw;
transition: transform 3s ease-out;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#spin{
background:#ffd600;
}

#truth{
background:#00c853;
color:white;
}

#dare{
background:#ff1744;
color:white;
}

#result{
margin-top:20px;
background:white;
color:black;
padding:20px;
border-radius:10px;
width:80%;
max-width:400px;
font-size:20px;
}

</style>

</head>

<body>

<h1>🍾 Spin The Bottle</h1>

<div id="bottle">🍾</div>

<button id="spin" onclick="spinBottle()">Spin The Bottle</button>

<div>
<button id="truth" onclick="getTruth()">Truth</button>
<button id="dare" onclick="getDare()">Dare</button>
</div>

<div id="result">Press Spin to start</div>

<script>

let bottle=document.getElementById("bottle");
let currentRotation=0;

let truths=[
"What is your biggest fear?",
"Who was your first crush?",
"Have you ever lied to your best friend?",
"What is your secret dream?",
"When did you know that you were attracted to me?",
"Where's the weirdest/most adventurous place you've had sex?",
"Do you have any secret fantasies?",
"What's your favourite sex position?",
"When was the last time you masturbated?",
"Name something typically non-sexual that turns you on?",
"Jab tumne mujhe pehli baar dekha tha, toh dimaag mein sabse pehli sharati baat kya aayi thi?",
"Humari pehli kiss ke baad tumne ghar jaakar kya socha tha?",
"Meri kaunsi aisi aadat hai jo tumhe sabse zyada unreallistically pyaari lagti hai?",
"Kya koi aisa gaana hai jo tum sunte ho aur tumhe meri yaad ekdum romantic tarike se aati hai?",
"Humari pehli date par, kya tumne mujhe impress karne ke liye kuch extra plan kiya tha?",
"Meri body ka wo kaunsa part hai jise tum bina thake ghanto tak dekh sakte ho?",
"Agar hum kisi sunsaan island par akele ho toh tum mere saath pehla ghanta kaise bitaoge?",
"Kya koi aisi fantasy hai jo tumne mujhe kabhi batayi nahi par mere saath poori karni hai?",
"Jab main tumhare kaan mein dheere se kuch bolta/bolti hoon toh tumhe kaisa feel hota hai?",
"Agar tumhe mujhe sirf ek baar touch karke batana ho ki tum mujhse kitna pyaar karte ho toh tum kahan touch karoge?",
"Meri kaunsi dress ya outfit dekh kar tumhara dil sabse zyada zor se dhadakta hai?",
"Kya tumne kabhi kaam karte waqt mere baare mein koi naughty khayal socha hai?",
"Tumhe mere baare mein sabse zyada addictive kya lagta hai?",
"Agar tumhe mujhe abhi isi waqt kiss karna ho toh tum kahan se shuru karoge?",
"Tumhare hisaab se humari chemistry 1 se 10 ke beech mein kahan hai? Be honest!",
"Hamari sabse dreamy date kaisi honi chahiye jo humne abhi tak nahi ki?",
"Agar main tumhe ek din ke liye kidnap kar loon, toh tum kya chahoge main tumhare saath kya karoon?",
"Kya tumne kabhi mere purane messages padhkar akele mein smile kiya hai?",
"Wo kaunsi ek cheez hai jo main karta karti hoon aur tum ekdum pighal jaate ho?",
"Agar hume dobara milne ka mauka mile ek anjaan ki tarah toh tum mujhe kaise approach karoge?",
];

let dares=[
"Go live on one of your social media accounts and declare your love for me",
"Recall the day or night we met from your perspective",
"Draw or paint a picture using only your feet",
"Post the oldest selfie on your phone to Instagram Stories",
"Write a love poem for me in five minutes or less",
"Grab something from the kitchen and try to eat it in the funniest way possible",
"See how many ice cubes you can fit into your mouth and let them melt",
"Deliver your best five-minute stand-up comedy",
"Let me do your makeup while blindfolded",
"french kiss",
" hide a chocolate in your clothes and let me find it",
"let me draw you naked",
"remove 3 clothes",
"Swap outfits with me",
"Say yes to everything for the next hour",
"Read out the last five things in your Google search history",
"Call someone I choose and sing happy birthday to them",
"Have a shower with your clothes on",
"Send me a flirty message using only emojis",
"Send the weirdest GIF you can find to the 15th person in your contact list",
"Sing a song loudly",
"Do 10 jumping jacks",
"give me sensual back massage for five minutes",
"kiss me in a way that makes me laugh and melt at the same time", 
"go to another room take a Sexy picture and send it to me",
"take off an item of my clothing without using your hand",
"30 sec planks", 
"lift me in your arms",
"Dance for 20 seconds",
"Talk in funny voice for 1 minute"
];

function spinBottle(){

let extraRotation = 3600 + Math.floor(Math.random()*720);

currentRotation += extraRotation;

bottle.style.transform="rotate("+currentRotation+"deg)";

document.getElementById("result").innerText="Bottle spinning...";
}

function getTruth(){

let r=Math.floor(Math.random()*truths.length);

document.getElementById("result").innerText=truths[r];
}

function getDare(){

let r=Math.floor(Math.random()*dares.length);

document.getElementById("result").innerText=dares[r];
}

</script>

</body>
</html>
